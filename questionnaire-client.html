<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionnaire Client / Client Questionnaire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: #000;
      padding: 0 24px;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 72px;
    }
    .header-logo-bar {
      line-height: 0;
    }
    .logo-img {
      height: 30px !important;
      width: auto !important;
      display: block;
    }
    .header-controls {
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
    }
    .lang-btn {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.15); }
    .client-banner {
      background: #e8f0fe;
      border-left: 4px solid #1a3a5c;
      padding: 10px 40px;
      font-size: 14px;
      color: #1a3a5c;
      font-weight: 600;
      display: none;
    }
    .client-banner.visible { display: block; }
    .container {
      max-width: 780px;
      margin: 32px auto;
      padding: 0 20px 60px;
    }
    .form-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 32px;
    }
    .form-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a3a5c;
      margin-bottom: 8px;
    }
    .required-note { font-size: 12px; color: #888; margin-bottom: 20px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin: 28px 0 16px;
      padding: 8px 14px;
      background: #000;
      border-left: none;
      border-radius: 2px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: 6px;
    }
    .required { color: #c0392b; }
    input, select, textarea {
      padding: 10px 12px;
      border: 1px solid #d0d7e0;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1a3a5c;
      box-shadow: 0 0 0 3px rgba(26,58,92,0.1);
    }
    textarea { resize: vertical; min-height: 80px; }
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      justify-content: center;
    }
    button {
      padding: 12px 32px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-submit {
      background: #1a3a5c;
      color: #fff;
    }
    .btn-submit:hover { background: #2a5080; }
    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-reset {
      background: #e8e8e8;
      color: #333;
    }
    .btn-reset:hover { background: #d0d0d0; }
    .status-message {
      padding: 12px 16px;
      border-radius: 4px;
      margin-top: 16px;
      text-align: center;
      font-weight: 600;
      display: none;
    }
    .status-message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status-message.loading {
      background: #e2e3e5;
      color: #383d41;
      display: block;
    }
    @media (max-width: 600px) {
      .header { padding: 0 16px; min-height: 56px; }
      .header-logo-bar img { height: 20px; }
      .form-card { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .button-group { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo-bar">
    <<img class="logo-img" src="https://www.lexon.com/on/demandware.static/Sites-lexon-eu-Site/-/default/dwda3e9b04/images/lexon-logo.png" alt="LEXON">
  </div>
  <div class="header-controls">
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
  </div>
</div>

<div class="client-banner" id="clientBanner"></div>

<div class="container">
  <div class="form-card">
    <div class="form-title" id="formTitle">Questionnaire de données administratives client</div>
    <p class="required-note" id="requiredNote">Les champs marqués d'un <span style="color:#c0392b">*</span> sont obligatoires.</p>

    <form id="questionnaireForm" novalidate>
      <input type="hidden" id="langue" name="langue" value="FR">
      <input type="hidden" id="code_client" name="code_client" value="">

      <!-- SECTION 1 -->
      <div class="section-title" id="sec1Title">1. Identification de la société</div>
      <div class="form-row full">
        <div class="form-group">
          <label for="raison_sociale" id="lbl_raison_sociale">Raison sociale <span class="required">*</span></label>
          <input type="text" id="raison_sociale" name="raison_sociale" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="siren" id="lbl_siren">SIREN <span class="required">*</span></label>
          <input type="text" id="siren" name="siren" required>
        </div>
        <div class="form-group">
          <label for="tva" id="lbl_tva">N° TVA</label>
          <input type="text" id="tva" name="tva">
        </div>
      </div>

      <!-- SECTION 2 -->
      <div class="section-title" id="sec2Title">2. Adresse du siège social</div>
      <div class="form-row full">
        <div class="form-group">
          <label for="rue_siege" id="lbl_rue_siege">Rue <span class="required">*</span></label>
          <input type="text" id="rue_siege" name="rue_siege" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cp_siege" id="lbl_cp_siege">Code postal <span class="required">*</span></label>
          <input type="text" id="cp_siege" name="cp_siege" required>
        </div>
        <div class="form-group">
          <label for="ville_siege" id="lbl_ville_siege">Ville <span class="required">*</span></label>
          <input type="text" id="ville_siege" name="ville_siege" required>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label for="pays_siege" id="lbl_pays_siege">Pays <span class="required">*</span></label>
          <input type="text" id="pays_siege" name="pays_siege" required>
        </div>
      </div>

      <!-- SECTION 3 -->
      <div class="section-title" id="sec3Title">3. Contact acheteur</div>
      <div class="form-row">
        <div class="form-group">
          <label for="acheteur_prenom" id="lbl_acheteur_prenom">Prénom <span class="required">*</span></label>
          <input type="text" id="acheteur_prenom" name="acheteur_prenom" required>
        </div>
        <div class="form-group">
          <label for="acheteur_nom" id="lbl_acheteur_nom">Nom <span class="required">*</span></label>
          <input type="text" id="acheteur_nom" name="acheteur_nom" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="acheteur_email" id="lbl_acheteur_email">Email <span class="required">*</span></label>
          <input type="email" id="acheteur_email" name="acheteur_email" required>
        </div>
        <div class="form-group">
          <label for="acheteur_tel" id="lbl_acheteur_tel">Téléphone <span class="required">*</span></label>
          <input type="tel" id="acheteur_tel" name="acheteur_tel" required>
        </div>
      </div>

      <!-- SECTION 4 -->
      <div class="section-title" id="sec4Title">4. Contact comptabilité</div>
      <div class="form-row">
        <div class="form-group">
          <label for="compta_prenom" id="lbl_compta_prenom">Prénom <span class="required">*</span></label>
          <input type="text" id="compta_prenom" name="compta_prenom" required>
        </div>
        <div class="form-group">
          <label for="compta_nom" id="lbl_compta_nom">Nom <span class="required">*</span></label>
          <input type="text" id="compta_nom" name="compta_nom" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="compta_email" id="lbl_compta_email">Email <span class="required">*</span></label>
          <input type="email" id="compta_email" name="compta_email" required>
        </div>
        <div class="form-group">
          <label for="compta_tel" id="lbl_compta_tel">Téléphone <span class="required">*</span></label>
          <input type="tel" id="compta_tel" name="compta_tel" required>
        </div>
      </div>

      <!-- SECTION 5 -->
      <div class="section-title" id="sec5Title">5. Adresse de facturation <span id="sec5sub" style="font-weight:400;font-size:13px;">(si différente du siège)</span></div>
      <div class="form-row full">
        <div class="form-group">
          <label for="rue_fact" id="lbl_rue_fact">Rue</label>
          <input type="text" id="rue_fact" name="rue_fact">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="cp_fact" id="lbl_cp_fact">Code postal</label>
          <input type="text" id="cp_fact" name="cp_fact">
        </div>
        <div class="form-group">
          <label for="ville_fact" id="lbl_ville_fact">Ville</label>
          <input type="text" id="ville_fact" name="ville_fact">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label for="pays_fact" id="lbl_pays_fact">Pays</label>
          <input type="text" id="pays_fact" name="pays_fact">
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-submit" id="btnSubmit">Envoyer le questionnaire</button>
        <button type="reset" class="btn-reset" id="btnReset">Effacer</button>
      </div>
      <div class="status-message" id="statusMessage"></div>
    </form>
  </div>
</div>

<script>
  const POWER_AUTOMATE_URL = 'https://defaultf7a335a8ec964553acfe218ec455fb.eb.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e66fe23095bf4f57bd9f55bb9969867b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0';

  const translations = {
    FR: {
      formTitle: 'Questionnaire de données administratives client',
      requiredNote: 'Les champs marqués d\'un <span style="color:#c0392b">*</span> sont obligatoires.',
      bannerPrefix: 'Code client : ',
      sec1Title: '1. Identification de la société',
      sec2Title: '2. Adresse du siège social',
      sec3Title: '3. Contact acheteur',
      sec4Title: '4. Contact comptabilité',
      sec5Title: '5. Adresse de facturation ',
      sec5sub: '(si différente du siège)',
      lbl_raison_sociale: 'Raison sociale',
      lbl_siren: 'SIREN',
      lbl_tva: 'N° TVA',
      lbl_rue_siege: 'Rue',
      lbl_cp_siege: 'Code postal',
      lbl_ville_siege: 'Ville',
      lbl_pays_siege: 'Pays',
      lbl_acheteur_prenom: 'Prénom',
      lbl_acheteur_nom: 'Nom',
      lbl_acheteur_email: 'Email',
      lbl_acheteur_tel: 'Téléphone',
      lbl_compta_prenom: 'Prénom',
      lbl_compta_nom: 'Nom',
      lbl_compta_email: 'Email',
      lbl_compta_tel: 'Téléphone',
      lbl_rue_fact: 'Rue',
      lbl_cp_fact: 'Code postal',
      lbl_ville_fact: 'Ville',
      lbl_pays_fact: 'Pays',
      btnSubmit: 'Envoyer le questionnaire',
      btnReset: 'Effacer',
      loadingMsg: 'Envoi en cours...',
      successMsg: 'Merci ! Vos données ont été enregistrées avec succès.'
    },
    EN: {
      formTitle: 'Customer Administrative Data Questionnaire',
      requiredNote: 'Fields marked with <span style="color:#c0392b">*</span> are required.',
      bannerPrefix: 'Customer Code: ',
      sec1Title: '1. Company Identification',
      sec2Title: '2. Head Office Address',
      sec3Title: '3. Buyer Contact',
      sec4Title: '4. Accounting Contact',
      sec5Title: '5. Billing Address ',
      sec5sub: '(if different from head office)',
      lbl_raison_sociale: 'Company Name',
      lbl_siren: 'SIREN',
      lbl_tva: 'VAT Number',
      lbl_rue_siege: 'Street',
      lbl_cp_siege: 'Postal Code',
      lbl_ville_siege: 'City',
      lbl_pays_siege: 'Country',
      lbl_acheteur_prenom: 'First Name',
      lbl_acheteur_nom: 'Last Name',
      lbl_acheteur_email: 'Email',
      lbl_acheteur_tel: 'Phone',
      lbl_compta_prenom: 'First Name',
      lbl_compta_nom: 'Last Name',
      lbl_compta_email: 'Email',
      lbl_compta_tel: 'Phone',
      lbl_rue_fact: 'Street',
      lbl_cp_fact: 'Postal Code',
      lbl_ville_fact: 'City',
      lbl_pays_fact: 'Country',
      btnSubmit: 'Submit Questionnaire',
      btnReset: 'Clear',
      loadingMsg: 'Sending...',
      successMsg: 'Thank you! Your data has been successfully submitted.'
    }
  };

  let currentLang = 'FR';
  let codeClient = '';

  function toggleLang() {
    currentLang = currentLang === 'FR' ? 'EN' : 'FR';
    document.getElementById('langue').value = currentLang;
    updateLanguage();
  }

  function updateLanguage() {
    const t = translations[currentLang];
    document.getElementById('formTitle').innerHTML = t.formTitle;
    document.getElementById('requiredNote').innerHTML = t.requiredNote;
    document.getElementById('langBtn').textContent = currentLang === 'FR' ? 'English' : 'Français';

    for (const [key, value] of Object.entries(t)) {
      if (key.startsWith('sec') || key.startsWith('lbl') || key.startsWith('btn')) {
        const elem = document.getElementById(key);
        if (elem) elem.innerHTML = value;
      }
    }
  }

  function getUrlParam(param) {
    const params = new URLSearchParams(window.location.search);
    return params.get(param) || '';
  }

  document.addEventListener('DOMContentLoaded', function() {
    codeClient = getUrlParam('code') || '';
    const urlLang = getUrlParam('pays') || 'FR';

    if (codeClient) {
      const banner = document.getElementById('clientBanner');
      banner.textContent = translations.FR.bannerPrefix + codeClient;
      banner.classList.add('visible');
    }

    if (['EN', 'FR'].includes(urlLang)) {
      currentLang = urlLang;
      document.getElementById('langue').value = currentLang;
      updateLanguage();
    }

    document.getElementById('code_client').value = codeClient;
    document.getElementById('questionnaireForm').addEventListener('submit', handleSubmit);
  });

  async function handleSubmit(e) {
    e.preventDefault();

    const form = document.getElementById('questionnaireForm');
    const statusMsg = document.getElementById('statusMessage');

    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }

    const btnSubmit = document.getElementById('btnSubmit');
    btnSubmit.disabled = true;
    statusMsg.textContent = translations[currentLang].loadingMsg;
    statusMsg.classList.remove('success');
    statusMsg.classList.add('loading');

    const formData = new FormData(form);
    const data = {};
    formData.forEach((value, key) => {
      data[key] = value;
    });
    data.date_soumission = new Date().toISOString();

    try {
      const response = await fetch(POWER_AUTOMATE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        statusMsg.textContent = translations[currentLang].successMsg;
        statusMsg.classList.remove('loading');
        statusMsg.classList.add('success');
        form.reset();
        document.getElementById('langue').value = currentLang;
        document.getElementById('code_client').value = codeClient;
      } else {
        statusMsg.textContent = 'Erreur lors de l\'envoi. Veuillez réessayer.';
        statusMsg.classList.remove('loading');
        statusMsg.classList.add('success');
      }
    } catch (error) {
      statusMsg.textContent = 'Erreur de connexion. Veuillez réessayer.';
      statusMsg.classList.remove('loading');
      statusMsg.classList.add('success');
    }

    btnSubmit.disabled = false;
  }
</script>

</body>
</html></html>
