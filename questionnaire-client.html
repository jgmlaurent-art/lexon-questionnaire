<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questionnaire Client / Client Questionnaire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: #000;
      padding: 0 24px;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 72px;
    }
    .header-logo-bar {
      line-height: 0;
    }
    .logo-img {
      height: 24px !important;
      width: auto !important;
      display: block;
    }
    .header-controls {
      position: absolute;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-svg { height: 48px; width: auto; }
    .lang-btn {
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.15); }
    .client-banner {
      background: #e8f0fe;
      border-left: 4px solid #1a3a5c;
      padding: 10px 40px;
      font-size: 14px;
      color: #1a3a5c;
      font-weight: 600;
      display: none;
    }
    .client-banner.visible { display: block; }
    .container {
      max-width: 780px;
      margin: 32px auto;
      padding: 0 20px 60px;
    }
    .form-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 36px 40px;
    }
    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #000;
      margin-bottom: 28px;
      border-bottom: 2px solid #1a3a5c;
      padding-bottom: 12px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin: 28px 0 16px;
      padding: 8px 14px;
      background: #000;
      border-left: none;
      border-radius: 2px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group.full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
    }
    label span.required { color: #c0392b; }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #1a3a5c;
      background: #fff;
    }
    input[readonly] {
      background: #e8edf2;
      color: #666;
      cursor: default;
    }
    input.error { border-color: #c0392b; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .submit-btn:hover:not(:disabled) { background: #2a5080; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }
    .msg {
      display: none;
      padding: 16px 20px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 15px;
      font-weight: 600;
    }
    .msg.success { display: block; background: #e8f8f0; color: #1a7a40; border: 1px solid #a3d9b8; }
    .msg.error { display: block; background: #fdecea; color: #c0392b; border: 1px solid #f5b7b1; }
    .required-note { font-size: 12px; color: #888; margin-bottom: 20px; }
    @media (max-width: 600px) {
      .header { padding: 0 16px; min-height: 56px; }
      .header-logo-bar img { height: 20px; }
      .header-controls { right: 12px; }
      .form-card { padding: 24px 20px; }
      .form-row { grid-template-columns: 1fr; }
      .client-banner { padding: 10px 20px; }
    }
  </style>
</head>

  let currentLang = 'FR';
  let codeClient = '';

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    const pays = (params.get('pays') || 'FR').toUpperCase();
    currentLang = pays === 'EN' ? 'EN' : 'FR';
    codeClient = params.get('code') || '';
  }

  function applyLang(lang) {
    currentLang = lang;
    const t = i18n[lang];
    document.getElementById('formTitle').textContent = t.formTitle;
    document.getElementById('requiredNote').innerHTML = t.requiredNote;
    document.getElementById('sec1Title').textContent = t.sec1Title;
    document.getElementById('sec2Title').textContent = t.sec2Title;
    document.getElementById('sec3Title').textContent = t.sec3Title;
    document.getElementById('sec4Title').textContent = t.sec4Title;
    document.getElementById('sec5Title').innerHTML = t.sec5Title + ' <span id="sec5sub" style="font-weight:400;font-size:13px;">' + t.sec5sub + '</span>';
    document.getElementById('submitBtn').textContent = t.submitBtn;
    document.getElementById('langBtn').textContent = t.langBtn;
    document.getElementById('langue').value = lang;

    const labels = ['lbl_raison','lbl_siren','lbl_tva','lbl_rue_siege','lbl_cp_siege','lbl_ville_siege',
      'lbl_pays_siege','lbl_acheteur_nom','lbl_acheteur_prenom','lbl_acheteur_email','lbl_acheteur_tel',
      'lbl_compta_nom','lbl_compta_prenom','lbl_compta_email','lbl_compta_tel',
      'lbl_rue_fact','lbl_cp_fact','lbl_ville_fact','lbl_pays_fact'];
    labels.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = t[id];
    });

    // Update banner
    if (codeClient) {
      const banner = document.getElementById('clientBanner');
      banner.textContent = t.bannerPrefix + codeClient;
      banner.classList.add('visible');
    }

    // Update page language
    document.documentElement.lang = lang === 'EN' ? 'en' : 'fr';
  }

  function toggleLang() {
    applyLang(currentLang === 'FR' ? 'EN' : 'FR');
  }

  function validate() {
    const required = ['raison_sociale','siren','rue_siege','cp_siege','ville_siege','pays_siege',
      'acheteur_nom','acheteur_prenom','acheteur_email','compta_nom','compta_prenom','compta_email'];
    let valid = true;
    document.querySelectorAll('input').forEach(i => i.classList.remove('error'));
    required.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('error'); valid = false; }
    });
    // Email validation
    ['acheteur_email','compta_email'].forEach(id => {
      const el = document.getElementById(id);
      if (el.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) {
        el.classList.add('error'); valid = false;
      }
    });
    return valid;
  }

  document.getElementById('questionnaireForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!validate()) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = currentLang === 'FR' ? 'Envoi en cours...' : 'Submitting...';
    document.getElementById('msgSuccess').className = 'msg';
    document.getElementById('msgError').className = 'msg error';

    const payload = {
      langue: document.getElementById('langue').value,
      code_client: codeClient,
      raison_sociale: document.getElementById('raison_sociale').value,
      siren: document.getElementById('siren').value,
      tva: document.getElementById('tva').value,
      rue_siege: document.getElementById('rue_siege').value,
      cp_siege: document.getElementById('cp_siege').value,
      ville_siege: document.getElementById('ville_siege').value,
      pays_siege: document.getElementById('pays_siege').value,
      acheteur_nom: document.getElementById('acheteur_nom').value,
      acheteur_prenom: document.getElementById('acheteur_prenom').value,
      acheteur_email: document.getElementById('acheteur_email').value,
      acheteur_tel: document.getElementById('acheteur_tel').value,
      compta_nom: document.getElementById('compta_nom').value,
      compta_prenom: document.getElementById('compta_prenom').value,
      compta_email: document.getElementById('compta_email').value,
      compta_tel: document.getElementById('compta_tel').value,
      rue_fact: document.getElementById('rue_fact').value,
      cp_fact: document.getElementById('cp_fact').value,
      ville_fact: document.getElementById('ville_fact').value,
      pays_fact: document.getElementById('pays_fact').value,
      date_soumission: new Date().toISOString()
    };

    try {
      const response = await fetch(POWER_AUTOMATE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (response.ok || response.status === 202) {
        document.getElementById('questionnaireForm').style.display = 'none';
        const t = i18n[currentLang];
        document.getElementById('msgSuccessText').textContent = t.msgSuccess;
        document.getElementById('msgSuccess').className = 'msg success';
      } else {
        throw new Error('HTTP ' + response.status);
      }
    } catch(err) {
      const t = i18n[currentLang];
      document.getElementById('msgErrorText').textContent = t.msgError;
      document.getElementById('msgError').className = 'msg error';
      btn.disabled = false;
      btn.textContent = i18n[currentLang].submitBtn;
    }
  });

  // Init
  getParams();
  document.getElementById('code_client').value = codeClient;
  applyLang(currentLang);
</script>
